<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Moonlit Lily - Albion Market Calculator</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@500;700&family=Lato:wght@300;400;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/theme.css" />
  <link rel="stylesheet" href="css/components.css" />
</head>
<body>
  <div class="lily-backdrop" aria-hidden="true"></div>

  <header class="app-header">
    <div class="brand">
      <svg class="lily-mark" viewBox="0 0 64 64" aria-hidden="true">
        <g fill="none" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round">
          <path d="M32 54 C32 40 24 34 14 30 C24 30 30 24 32 12 C34 24 40 30 50 30 C40 34 32 40 32 54 Z" />
          <path d="M32 54 L32 30" />
          <circle cx="32" cy="30" r="2" fill="currentColor" />
        </g>
      </svg>
      <div class="brand-text">
        <h1>Moonlit Lily</h1>
        <p class="brand-sub">Albion Market Calculator</p>
      </div>
    </div>

    <nav class="tabs" id="tabs" role="tablist">
      <a href="#equipment" data-tab="equipment" class="tab" role="tab">Equipment</a>
      <a href="#potions"   data-tab="potions"   class="tab" role="tab">Potions</a>
      <a href="#foods"     data-tab="foods"     class="tab" role="tab">Foods</a>
      <a href="#prices"    data-tab="prices"    class="tab" role="tab">Prices</a>
      <a href="#settings"  data-tab="settings"  class="tab" role="tab">Settings</a>
    </nav>

    <div class="header-meta">
      <span class="badge" id="server-badge">America</span>
    </div>
  </header>

  <main id="main">
    <section id="tab-equipment" class="tab-panel" role="tabpanel"></section>
    <section id="tab-potions"   class="tab-panel" role="tabpanel"></section>
    <section id="tab-foods"     class="tab-panel" role="tabpanel"></section>
    <section id="tab-prices"    class="tab-panel" role="tabpanel"></section>
    <section id="tab-settings"  class="tab-panel" role="tabpanel"></section>
  </main>

  <div id="toast-host" class="toast-host" aria-live="polite"></div>

  <footer class="app-footer">
    <span>Prices: <a href="https://www.albion-online-data.com/" target="_blank" rel="noopener">Albion Online Data Project</a></span>
    <span class="dot">&middot;</span>
    <span>Items: <a href="https://github.com/ao-data/ao-bin-dumps" target="_blank" rel="noopener">ao-bin-dumps</a></span>
    <span class="dot">&middot;</span>
    <span>Not affiliated with Sandbox Interactive.</span>
  </footer>

  <script type="module" src="js/app.js"></script>
</body>
</html>
